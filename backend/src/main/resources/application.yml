server:
  port: 10026

spring:
  application:
    name: fams-backend
  
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:famsdb;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  redis:
    host: 49.235.161.106
    port: 10012
    password: 
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.fams.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: fams-secret-key-2024-fixed-asset-management-system
  expiration: 86400000
  header: Authorization
  prefix: Bearer 

logging:
  level:
    com.fams: debug
    org.springframework.web: info
